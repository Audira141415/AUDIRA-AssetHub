services:
  db:
    image: postgres:17-alpine
    container_name: audira-db
    restart: always
    environment:
      POSTGRES_USER: audira
      POSTGRES_PASSWORD: audira_password
      POSTGRES_DB: audirahub
    ports:
      - "5432:5432"
    volumes:
      - audira_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audira -d audirahub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: audira-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - audira_redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: audira-minio
    restart: always
    environment:
      MINIO_ROOT_USER: audira_admin
      MINIO_ROOT_PASSWORD: audira_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - audira_miniodata:/data

volumes:
  audira_pgdata:
  audira_redisdata:
  audira_miniodata:
